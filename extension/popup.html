<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 360px; font-family: 'Courier New', monospace; background: #0a0a0f; color: #e2e8f0; }
    .header { display: flex; align-items: center; gap: 10px; padding: 16px; border-bottom: 1px solid #1e293b; }
    .header h1 { font-size: 14px; font-weight: 700; letter-spacing: 1px; }
    .header .badge { font-size: 9px; background: rgba(59,130,246,0.15); color: #60a5fa; padding: 2px 8px; border-radius: 4px; text-transform: uppercase; letter-spacing: 1px; font-weight: 700; }
    .section { padding: 16px; border-bottom: 1px solid #1e293b; }
    .section h2 { font-size: 10px; color: #64748b; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px; font-weight: 700; }
    .status { display: flex; align-items: center; gap: 8px; padding: 10px; background: #111827; border: 1px solid #1e293b; border-radius: 8px; margin-bottom: 8px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; }
    .dot.green { background: #22c55e; box-shadow: 0 0 6px #22c55e; }
    .dot.red { background: #ef4444; box-shadow: 0 0 6px #ef4444; }
    .dot.yellow { background: #eab308; box-shadow: 0 0 6px #eab308; }
    .status-text { font-size: 11px; }
    .status-label { color: #64748b; font-size: 10px; }
    input[type="password"], input[type="text"] { width: 100%; background: #111827; border: 1px solid #1e293b; color: #e2e8f0; padding: 10px 12px; border-radius: 8px; font-family: inherit; font-size: 12px; outline: none; margin-bottom: 8px; }
    input:focus { border-color: #3b82f6; }
    .btn { width: 100%; padding: 10px; border: none; border-radius: 8px; font-family: inherit; font-size: 11px; font-weight: 700; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; transition: all 0.2s; }
    .btn-primary { background: #3b82f6; color: white; }
    .btn-primary:hover { background: #2563eb; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-secondary { background: #1e293b; color: #94a3b8; margin-top: 8px; }
    .btn-secondary:hover { background: #334155; color: white; }
    .note { font-size: 10px; color: #475569; line-height: 1.5; margin-top: 8px; }
    .footer { padding: 12px 16px; text-align: center; font-size: 9px; color: #334155; }
    #keyStatus { font-size: 11px; padding: 8px; border-radius: 6px; margin-top: 4px; }
    #keyStatus.valid { background: rgba(34,197,94,0.1); color: #22c55e; border: 1px solid rgba(34,197,94,0.2); }
    #keyStatus.invalid { background: rgba(239,68,68,0.1); color: #ef4444; border: 1px solid rgba(239,68,68,0.2); }
    #keyStatus.checking { background: rgba(234,179,8,0.1); color: #eab308; border: 1px solid rgba(234,179,8,0.2); }
  </style>
</head>
<body>
  <div class="header">
    <h1>⚡ SPHAZ NEXUS</h1>
    <span class="badge">Dual-Agent OS</span>
  </div>

  <div class="section">
    <h2>Connection Status</h2>
    <div class="status">
      <div class="dot" id="nexusDot"></div>
      <div>
        <div class="status-text" id="nexusStatus">Checking...</div>
        <div class="status-label">Nexus Web App</div>
      </div>
    </div>
    <div class="status">
      <div class="dot" id="apiDot"></div>
      <div>
        <div class="status-text" id="apiStatus">Not configured</div>
        <div class="status-label">Mistral API</div>
      </div>
    </div>
  </div>

  <div class="section">
    <h2>Mistral API Key</h2>
    <input type="password" id="apiKey" placeholder="sk-..." />
    <button class="btn btn-primary" id="validateBtn">Validate & Save</button>
    <div id="keyStatus" style="display:none;"></div>
    <p class="note">Your key is stored locally in Chrome storage and only sent to Mistral's API. It never leaves your browser.</p>
  </div>

  <div class="section">
    <h2>Actions</h2>
    <button class="btn btn-secondary" id="scanBtn">Scan Current Page</button>
    <button class="btn btn-secondary" id="connectBtn">Connect to Nexus App</button>
  </div>

  <div class="footer">Sphaz Nexus v2.0.0 — Dual-Agent Autonomous System</div>

  <script src="popup.js"></script>
</body>
</html>
